action: evaluate  # train | evaluate | extractsynthetic

paths:
  train_data: "DATA/splits_nilm_all_participants/train.csv"
  val_data: "DATA/splits_nilm_all_participants/val.csv"
  test_data: "DATA/splits_nilm_all_participants/test.csv"
  model_save: "results/models/full_stride_best_model.pth"
  model_meta: "results/models/full_stride_best_model_meta.json"
  input_scaler: "results/models/full_stride_input_scaler.save"
  output_scaler: "results/models/full_stride_output_scaler.save"
  predictions_csv: "results/csv/full_stride_test_predictions.csv"
  plots_dir: "results/plots"
  train_plot: "results/plots/full_stride_training_validation_loss.png"

data:
  # Για πρώτο clean experiment μπορείς να βάλεις participant, π.χ. ["certh5tgbjbh"]
  participants: []
  timestamp_col: "timestamp"
  drop_unlabeled_centers: true
  max_rows_strategy: "balanced_participants"  # head | balanced_participants | random
  max_rows_train:
  max_rows_val:
  max_rows_test:
  preprocessing:
    # Προσοχή: true μπορεί να αλλάξει distribution του dataset.
    correct_mains_vs_devices: false
    gaussian_sigma: 0
    align_mains_with_devices: false

model:
  type: transformer   # transformer | cnn
  input_dim: 1
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 256
  dropout: 0.1

train:
  window_size: 160
  stride: 8
  val_stride: 8
  batch_size: 128
  epochs: 12
  learning_rate: 0.0002
  weight_decay: 0.0001
  patience: 4
  lr_reduce_factor: 0.5
  lr_patience: 3
  runtime_device: auto
  num_workers: 2
  force_retrain: true

  # Imbalance handling
  balance_active_windows: true
  active_window_boost: 4.0
  active_loss_weight: 2.0
  use_device_frequency_weighting: true
  min_device_weight: 0.5
  max_device_weight: 4.0

  # Debug/smoke knobs
  max_train_batches:
  max_val_batches:

  # Build participant-device availability map from train split.
  participant_gating:
    enabled: true
    min_active_points: 20
    min_known_points: 200
    unknown_participant_behavior: "allow"  # allow | block

  # First multi-device subset (stable enough across participants)
  device_list:
    - "energy_dish_washer"
    - "energy_washing_machine"
    - "energy_fridge_freezer"
    - "energy_oven"

  active_thresholds:
    energy_dish_washer:
      min_duration: 3
      min_energy_value: 100
    energy_washing_machine:
      min_duration: 3
      min_energy_value: 100
    energy_fridge_freezer:
      min_duration: 0
      min_energy_value: 100
    energy_oven:
      min_duration: 3
      min_energy_value: 100

evaluate:
  window_size: 160
  batch_size: 256
  stride: 8
  runtime_device: auto
  num_workers: 2
  use_saved_metadata: true
  max_test_batches:
  plot_head: 9000

  postprocess_predictions: true
  postprocess_ground_truth: false
  on_off_capture:
    enabled: true
    precision_min: 0.70
    recall_min: 0.70
    f1_min: 0.70
    accuracy_min:
  participant_gating:
    enabled: true
    unknown_participant_behavior: "allow"  # allow | block

  # If metadata exists from training, this can be overridden automatically.
  device_list:
    - "energy_dish_washer"
    - "energy_washing_machine"
    - "energy_fridge_freezer"
    - "energy_oven"

  active_thresholds:
    energy_dish_washer:
      min_duration: 3
      min_energy_value: 100
    energy_washing_machine:
      min_duration: 3
      min_energy_value: 100
    energy_fridge_freezer:
      min_duration: 0
      min_energy_value: 100
    energy_oven:
      min_duration: 3
      min_energy_value: 100

  device_postprocessing_params:
    energy_dish_washer:
      min_duration: 3
      min_energy_value: 100
    energy_washing_machine:
      min_duration: 3
      min_energy_value: 100
    energy_fridge_freezer:
      min_duration: 0
      min_energy_value: 100
    energy_oven:
      min_duration: 3
      min_energy_value: 100

extractsynthetic:
  base_path: "DATA/SyntheticData/data"
  days: 180
